  check:
    if: always()
    needs:
      - build-assets
      - static-analysis
      - mysql
      - postgres13
      - postgres14
      - postgres15
      - sqlite
    runs-on: ubuntu-latest

    steps:
      - name: Check if all jobs are passing
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
